name: CI

# Lance les 3 suites de tests à chaque push et sur les pull requests.
# Objectif : filet anti-régression avant la prod (backend / mobile / web admin).
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  # ── Backend (Node/Express) ────────────────────────────────────────────────
  # Les tests d'intégration démarrent eux-mêmes un Postgres jetable via Docker
  # (globalSetup). Docker est préinstallé sur les runners ubuntu-latest.
  backend:
    name: Backend (Jest + Postgres Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm install
      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit
      - name: Test
        working-directory: backend
        run: npm test

  # ── Mobile (React Native / Expo) ──────────────────────────────────────────
  mobile:
    name: Mobile (Jest / jest-expo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        working-directory: mobile
        run: npm install
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Test
        working-directory: mobile
        run: npm test

  # ── Web admin (React + Vite) ──────────────────────────────────────────────
  web-admin:
    name: Web admin (Vitest + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/admin/package-lock.json
      - name: Install
        working-directory: web/admin
        run: npm install
      - name: Typecheck
        working-directory: web/admin
        run: npx tsc -b
      - name: Test
        working-directory: web/admin
        run: npm test
